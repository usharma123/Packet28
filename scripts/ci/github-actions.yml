name: coverage-suite-pr

on:
  pull_request:

jobs:
  coverage-suite:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      security-events: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable

      - name: Build all CLI binaries
        run: cargo build --release -p covy-cli -p diffy-cli -p testy-cli -p suite-cli

      - name: Run workspace tests
        run: cargo test --workspace

      - name: Smoke all CLI command surfaces
        run: |
          ./target/release/covy --help > /dev/null
          ./target/release/covy ingest --help > /dev/null
          ./target/release/diffy analyze --help > /dev/null
          ./target/release/testy impact --help > /dev/null
          ./target/release/testy shard plan --help > /dev/null
          ./target/release/testy testmap build --help > /dev/null
          ./target/release/Packet28 diff analyze --help > /dev/null
          ./target/release/Packet28 test impact --help > /dev/null

      - name: Ingest coverage (example)
        run: |
          if [ -f coverage/lcov.info ] && [ -f reports/sarif.sarif ]; then
            ./target/release/covy ingest coverage/lcov.info --issues reports/sarif.sarif
          else
            echo "Skipping ingest example: customize report paths for your repository."
          fi

      - name: Generate PR artifacts
        run: |
          if [ -f .covy/state/latest.bin ]; then
            ./target/release/covy pr \
              --base-ref origin/${{ github.base_ref }} \
              --head-ref HEAD \
              --output-comment comment.md \
              --output-sarif covy.sarif
          else
            echo "Skipping PR artifacts: no coverage state found. Run covy ingest with repo coverage inputs."
            cat <<'EOF' > comment.md
            ## covy

            Skipped PR artifacts: no coverage state found. Customize the ingest step for your repository.
            EOF
            printf '{"version":"2.1.0","runs":[]}\n' > covy.sarif
          fi

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: covy.sarif

      - name: Post PR comment
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr comment ${{ github.event.pull_request.number }} --edit-last --create-if-none --body-file comment.md
