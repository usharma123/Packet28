name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-14
            platform: darwin-arm64
            npm_os: darwin
            npm_cpu: arm64
          - target: x86_64-apple-darwin
            os: macos-13
            platform: darwin-x64
            npm_os: darwin
            npm_cpu: x64
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            platform: linux-x64
            npm_os: linux
            npm_cpu: x64
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            platform: linux-arm64
            npm_os: linux
            npm_cpu: arm64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools (Linux x64)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Install cross (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build release binaries
        run: |
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-musl" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      - name: Stage platform package
        run: |
          PKG_DIR="dist/@packet28/${{ matrix.platform }}"
          mkdir -p "$PKG_DIR/bin"

          cp target/${{ matrix.target }}/release/Packet28 "$PKG_DIR/bin/"
          cp target/${{ matrix.target }}/release/packet28d "$PKG_DIR/bin/"

          # Strip binaries to reduce size
          if command -v strip &> /dev/null; then
            strip "$PKG_DIR/bin/Packet28" "$PKG_DIR/bin/packet28d" 2>/dev/null || true
          fi

          # Generate package.json from template
          VERSION="${GITHUB_REF_NAME#v}"
          sed -e "s/PLATFORM/${{ matrix.platform }}/g" \
              -e "s/\"OS\"/\"${{ matrix.npm_os }}\"/g" \
              -e "s/\"CPU\"/\"${{ matrix.npm_cpu }}\"/g" \
              -e "s/0\.2\.0/$VERSION/g" \
              npm/platform-template/package.json > "$PKG_DIR/package.json"

      - name: Upload platform package
        uses: actions/upload-artifact@v4
        with:
          name: pkg-${{ matrix.platform }}
          path: dist/@packet28/${{ matrix.platform }}

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Download all platform packages
        uses: actions/download-artifact@v4
        with:
          path: dist/platforms

      - name: Publish platform packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"

          for platform in darwin-arm64 darwin-x64 linux-x64 linux-arm64; do
            PKG_DIR="dist/platforms/pkg-${platform}"
            echo "Publishing @packet28/${platform}@${VERSION}..."
            (cd "$PKG_DIR" && npm publish --access public --provenance)
          done

      - name: Publish root package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"

          # Stage root package
          ROOT_DIR="dist/packet28"
          cp -r npm/packet28/ "$ROOT_DIR/"
          sed -i "s/0\.2\.0/$VERSION/g" "$ROOT_DIR/package.json"
          chmod +x "$ROOT_DIR/bin/packet28.js" "$ROOT_DIR/bin/packet28-mcp.js"

          echo "Publishing packet28@${VERSION}..."
          (cd "$ROOT_DIR" && npm publish --access public --provenance)

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "Packet28 ${GITHUB_REF_NAME}" \
            --generate-notes

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build all binaries first
        run: cargo build --workspace
      - name: Run tests
        run: cargo test --workspace
