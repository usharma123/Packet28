<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#f0f0f0"/>
  <g transform="translate(600,315)">
    <circle cx="0" cy="0" r="240" fill="none" stroke="#333" stroke-width="3"/>
    <defs>
      <path id="arcTop" d="M -100,-218 A 240,240 0 0,1 210,-118"/>
    </defs>
    <text font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="24" fill="#333" letter-spacing="10" font-weight="400">
      <textPath href="#arcTop" startOffset="0%">EST. 2026</textPath>
    </text>
    <!-- P letter -->
    <g transform="translate(-80, 20)">
      <rect x="0" y="-120" width="18" height="220" rx="2" fill="#333"/>
      <rect x="-12" y="82" width="70" height="18" rx="2" fill="#333"/>
      <path d="M 18,-120 L 80,-120 A 60,60 0 0,1 80,-20 L 18,-20" fill="none" stroke="#333" stroke-width="16" stroke-linejoin="round"/>
    </g>
    <!-- Superscript 2 -->
    <text x="58" y="-50" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="64" fill="#333" font-weight="500">2</text>
    <!-- Subscript 8 -->
    <text x="48" y="80" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="80" fill="#333" font-weight="500">8</text>
  </g>
</svg>